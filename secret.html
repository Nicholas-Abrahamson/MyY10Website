<!DOCTYPE html>
<html>
<head>
<title>Secret</title>

<style>
body{
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f7d774, #f2b705);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container{
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 600px;
    box-shadow: 0 0 25px rgba(0,0,0,0.25);
    animation: fadeIn 0.8s ease;
}

h1{
    font-size: 36px;
    margin-bottom: 20px;
    color: #c28a00;
}

img{
    width: 450px;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

</head>

<body>

<div class="container">
    <h1>You found the secret gold coin!</h1>
    <img src="images/Gold Coins.jpg" alt="Gold Coins">
</div>

</body>
</html>
