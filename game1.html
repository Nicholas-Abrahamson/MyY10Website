<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Modern Flappy Bird</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: linear-gradient(180deg, #4facfe, #00f2fe);
        font-family: Arial, sans-serif;
    }

    canvas {
        display: block;
        margin: 0 auto;
    }

    #score {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 48px;
        font-weight: bold;
        color: white;
        text-shadow: 0 0 10px rgba(0,0,0,0.4);
        user-select: none;
    }

    #gameOver {
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translateX(-50%);
        font-size: 48px;
        font-weight: bold;
        color: white;
        text-shadow: 0 0 10px rgba(0,0,0,0.4);
        display: none;
        text-align: center;
    }

    #gameOver small {
        font-size: 22px;
        display: block;
        margin-top: 10px;
    }
</style>
</head>

<body>
<canvas id="gameCanvas"></canvas>
<div id="score">0</div>
<div id="gameOver">Game Over<br><small>Press SPACE or CLICK to restart</small></div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let bird, pipes, score, gameOver, gravity, jumpForce, pipeSpeed;
let sceneryOffset = 0;
let groundOffset = 0;

// Replace with your actual funnybird.html file
const SECRET_URL = "funnybird.html";

function resetGame() {
    bird = {
        x: canvas.width * 0.2,
        y: canvas.height / 2,
        radius: 22,
        velocity: 0,
        wingAngle: 0
    };

    pipes = [];
    score = 0;
    gravity = 0.5;
    jumpForce = -9;
    pipeSpeed = 3;
    gameOver = false;

    document.getElementById("score").textContent = score;
    document.getElementById("gameOver").style.display = "none";
}

function createPipe() {
    const gap = 260; // <-- Larger gap for easier gameplay
    const topHeight = Math.random() * (canvas.height - gap - 200) + 50;

    pipes.push({
        x: canvas.width,
        top: topHeight,
        bottom: topHeight + gap,
        width: 80
    });
}

function drawBird() {
    ctx.save();
    ctx.translate(bird.x, bird.y);

    // Body
    ctx.beginPath();
    ctx.ellipse(0, 0, 28, 22, 0, 0, Math.PI * 2);
    ctx.fillStyle = "#ffeb3b";
    ctx.fill();

    // Wing
    ctx.save();
    ctx.rotate(Math.sin(bird.wingAngle) * 0.4);
    ctx.beginPath();
    ctx.ellipse(-5, 5, 18, 10, 0, 0, Math.PI * 2);
    ctx.fillStyle = "#fdd835";
    ctx.fill();
    ctx.restore();

    // Eye
    ctx.beginPath();
    ctx.arc(10, -5, 5, 0, Math.PI * 2);
    ctx.fillStyle = "#000";
    ctx.fill();

    // Beak
    ctx.beginPath();
    ctx.moveTo(20, 0);
    ctx.lineTo(32, 5);
    ctx.lineTo(20, 10);
    ctx.fillStyle = "#ff9800";
    ctx.fill();

    ctx.restore();
}

function drawScenery() {
    sceneryOffset -= 0.5;
    groundOffset -= pipeSpeed;

    if (sceneryOffset < -canvas.width) sceneryOffset = 0;
    if (groundOffset < -canvas.width) groundOffset = 0;

    // Mountains
    ctx.fillStyle = "#ffffff22";
    ctx.beginPath();
    ctx.moveTo(sceneryOffset, canvas.height - 200);
    ctx.lineTo(sceneryOffset + 200, canvas.height - 350);
    ctx.lineTo(sceneryOffset + 400, canvas.height - 200);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(sceneryOffset + 300, canvas.height - 200);
    ctx.lineTo(sceneryOffset + 500, canvas.height - 380);
    ctx.lineTo(sceneryOffset + 700, canvas.height - 200);
    ctx.fill();

    // Ground
    ctx.fillStyle = "#4caf50";
    ctx.fillRect(groundOffset, canvas.height - 60, canvas.width, 60);
    ctx.fillRect(groundOffset + canvas.width, canvas.height - 60, canvas.width, 60);
}

function drawPipes() {
    pipes.forEach(pipe => {
        ctx.fillStyle = "#2ecc71";
        ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
        ctx.fillRect(pipe.x, pipe.bottom, pipe.width, canvas.height - pipe.bottom);
    });
}

function update() {
    if (gameOver) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawScenery();

    bird.velocity += gravity;
    bird.y += bird.velocity;
    bird.wingAngle += 0.2;

    if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 300) {
        createPipe();
    }

    pipes.forEach(pipe => {
        pipe.x -= pipeSpeed;

        if (
            bird.x + bird.radius > pipe.x &&
            bird.x - bird.radius < pipe.x + pipe.width &&
            (bird.y - bird.radius < pipe.top || bird.y + bird.radius > pipe.bottom)
        ) {
            endGame();
        }

        if (!pipe.scored && pipe.x + pipe.width < bird.x) {
            score++;
            pipe.scored = true;
            document.getElementById("score").textContent = score;

            if (score >= 10) {
                window.location.href = SECRET_URL;
            }
        }
    });

    pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);

    if (bird.y + bird.radius > canvas.height - 60 || bird.y - bird.radius < 0) {
        endGame();
    }

    drawPipes();
    drawBird();

    requestAnimationFrame(update);
}

function endGame() {
    gameOver = true;
    document.getElementById("gameOver").style.display = "block";
}

function jump() {
    if (gameOver) {
        resetGame();
        update();
    } else {
        bird.velocity = jumpForce;
    }
}

document.addEventListener("keydown", e => {
    if (e.code === "Space") jump();
});

document.addEventListener("mousedown", () => jump());

resetGame();
update();
</script>
</body>
</html>
