<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funny Bird</title>

    <!-- Modern Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #89f7fe, #66a6ff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 500px;
            animation: fadeIn 0.8s ease;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        img {
            width: 100%;
            max-width: 350px;
            border-radius: 15px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        img:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }

        p {
            margin-top: 20px;
            font-size: 18px;
            color: #555;
        }

        a {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 22px;
            background: #66a6ff;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        a:hover {
            background: #4a8be0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>You found the secret bird!</h1>

        <!-- Clicking the bird now takes you to the clicking challenge -->
        <img src="images/Funny.Bird.jpg" alt="Funny Bird" onclick="window.location.href='clickchallenge.html'">

        <p>Can you find the other Secret? (It's on this page)</p>

        <!-- Link back to the game -->
        <a href="index.html">Home Page</a>
    </div>

</body>
</html>
